services:
  server:
    image: 383349724158.dkr.ecr.us-east-1.amazonaws.com/tasktracker-dev-server:latest
    container_name: tasktracker-server
    env_file:
      - ./server.env
    restart: unless-stopped

  client:
    image: 383349724158.dkr.ecr.us-east-1.amazonaws.com/tasktracker-dev-client:latest
    container_name: tasktracker-client
    depends_on:
      - server
    ports:
      - "80:80"
    restart: unless-stopped